<!DOCTYPE HTML>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TvPops</title>
    <link rel="stylesheet" href="Style/estilo.css">
</head>
<body>

    <div id="header">
        <h1 id="pontos">00 / 35</h1>
    </div>

    <div id="players">
        <!-- Injetado dinamicamente via JS -->
    </div>

    <audio id="controle">
        <source id="som" type="audio/mpeg">
    </audio>  

    <script src="JS/main.js"></script>

	<div id="modal-parabens" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <h2>INCRÍVEL!</h2>
            <p>Você demonstrou que é um verdadeiro especialista e gabaritou essa categoria!</p>
            <div class="modal-score">
                Placar: <span id="score-final">35/35</span>
            </div>
            <button onclick="window.location.href='../index.html'" class="btn-menu">Voltar para o Menu</button>
        </div>
    </div>
</body>
</html>
